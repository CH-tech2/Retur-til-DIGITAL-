```html
<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scanner App</title>

<script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>

body{
    font-family:Arial;
    background:#f5f5f5;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

h1{
    margin-bottom:20px;
}

#interactive{
    width:100%;
    max-width:280px;
    height:180px;
    margin:auto;
    border-radius:10px;
    overflow:hidden;
    background:black;
    display:none;
}

#interactive video,
#interactive canvas{
    width:100%;
    height:100%;
    object-fit:cover;
}

button{
    padding:12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    color:white;
}

.btn-green{
    background:#208684;
}

.btn-red{
    background:#D20014;
}

.btn-gray{
    background:#666;
}

.buttons{
    display:flex;
    gap:10px;
    margin-top:15px;
}

input,
select{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:16px;
}

.item{
    background:#f2f2f2;
    padding:10px;
    border-radius:8px;
    margin-top:10px;
}

.status{
    margin-top:10px;
    padding:10px;
    border-radius:8px;
    background:#eef;
}

</style>
</head>

<body>

<div class="container">

<h1>📱 Enhed Scanner</h1>

<button class="btn-green" onclick="createList()">
➕ Ny Liste
</button>

<h3 id="listTitle"></h3>

<div id="interactive"></div>

<div class="buttons">

<button class="btn-green" onclick="startCamera()">
📷 Start
</button>

<button class="btn-red" onclick="stopCamera()">
⛔ Stop
</button>

<button class="btn-gray" onclick="scanOCR()">
🔍 Læs Tekst
</button>

</div>

<input type="text" id="codeInput" placeholder="Kode">

<select id="deviceType">
<option value="">Vælg type</option>
<option value="Tablet">Tablet</option>
<option value="Telefon">Telefon</option>
<option value="PC">PC</option>
</select>

<div class="buttons">

<button class="btn-green" onclick="addItem()">
✅ Tilføj
</button>

</div>

<div class="status" id="status">
Klar
</div>

<h3>Enheder</h3>

<div id="items"></div>

</div>

<script>

let lists = [];
let currentList = null;

let cameraActive = false;

let quaggaHandler = null;

function setStatus(text){

    document.getElementById('status').innerText = text;

}

function createList(){

    const title = prompt('Liste navn');

    if(!title) return;

    currentList = {

        title:title,
        items:[]

    };

    document.getElementById('listTitle').innerText = title;

    renderItems();

}

function startCamera(){

    if(cameraActive) return;

    document.getElementById('interactive').style.display = 'block';

    Quagga.init({

        inputStream:{
            type:"LiveStream",
            target:document.querySelector('#interactive'),
            constraints:{
                facingMode:"environment",
                width:640,
                height:480
            }
        },

        locator:{
            patchSize:"medium",
            halfSample:true
        },

        decoder:{
            readers:[
                "code_128_reader",
                "ean_reader",
                "ean_8_reader"
            ]
        }

    }, function(err){

        if(err){

            console.log(err);

            setStatus('❌ Kamera fejl');

            return;
        }

        Quagga.start();

        cameraActive = true;

        setStatus('📷 Kamera startet');

    });

    quaggaHandler = function(result){

        if(result.codeResult){

            const code = result.codeResult.code;

            document.getElementById('codeInput').value = code;

            setStatus('✅ Stregkode fundet');

            stopCamera();

        }

    };

    Quagga.onDetected(quaggaHandler);

}

function stopCamera(){

    try{

        Quagga.stop();

    }catch(e){

        console.log(e);

    }

    cameraActive = false;

    document.getElementById('interactive').style.display = 'none';

    setStatus('⛔ Kamera stoppet');

}

async function scanOCR(){

    try{

        setStatus('🔍 Læser tekst...');

        const video = document.querySelector('#interactive video');

        if(!video){

            setStatus('❌ Start kamera først');

            return;
        }

        const canvas = document.createElement('canvas');

        canvas.width = video.videoWidth;

        canvas.height = video.videoHeight;

        const ctx = canvas.getContext('2d');

        ctx.drawImage(video,0,0);

        const result = await Tesseract.recognize(
            canvas,
            'eng'
        );

        let text = result.data.text;

        text = text.replace(/\n/g,' ').trim();

        document.getElementById('codeInput').value = text;

        setStatus('✅ Tekst fundet');

    }catch(err){

        console.log(err);

        setStatus('❌ OCR fejl');

    }

}

function addItem(){

    if(!currentList){

        setStatus('❌ Opret liste først');

        return;

    }

    const code = document.getElementById('codeInput').value.trim();

    const type = document.getElementById('deviceType').value;

    if(!code){

        setStatus('❌ Ingen kode');

        return;

    }

    if(!type){

        setStatus('❌ Vælg type');

        return;

    }

    const exists = currentList.items.some(
        item => item.code === code
    );

    if(exists){

        setStatus('⚠️ Findes allerede');

        return;

    }

    currentList.items.push({

        code:code,
        type:type

    });

    renderItems();

    document.getElementById('codeInput').value='';

    document.getElementById('deviceType').value='';

    setStatus('✅ Tilføjet');

}

function renderItems(){

    const div = document.getElementById('items');

    if(!currentList){

        div.innerHTML='';

        return;
    }

    div.innerHTML = currentList.items.map(item => `

        <div class="item">

            <b>${item.code}</b>
            <br>
            ${item.type}

        </div>

    `).join('');

}

</script>

</body>
</html>
