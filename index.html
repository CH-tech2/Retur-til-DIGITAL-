<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <title>Rockwool Device Scan App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      color: #656565;
      margin: 0;
      padding: 0;
    }
    header {
      background: #D20014;
      padding: 20px 0 8px 0;
      text-align: center;
    }
    header svg {
      margin-bottom: 4px;
    }
    header h1 {
      color: #fff;
      margin: 0;
      font-size: 22px;
      letter-spacing: 2px;
    }
    main {
      max-width: 420px;
      margin: 20px auto;
      background: #fff;
      border-radius: 8px;
      padding: 18px;
      box-shadow: 0 2px 8px #20868413;
    }
    button {
      background: #208684;
      color: #fff;
      border: none;
      padding: 15px 22px;
      margin: 8px 0;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s;
    }
    button:disabled {
      background: #aaa;
      cursor: not-allowed;
    }
    button:hover:enabled {
      background: #656565;
    }
    .actions button {
      width: 46%;
      display: inline-block;
      margin: 8px 2%;
    }
    #manualInput {
      margin: 18px 0;
      display: flex;
      flex-direction: row;
      align-items: center;
    }
    #manualInput input {
      flex: 1;
      padding: 10px;
      margin-right: 8px;
      border-radius: 6px;
      border: 1px solid #208684;
      font-size: 16px;
    }
    .modal {
      position: fixed;
      top:0; left:0; width:100%; height:100%; 
      background: rgba(100,100,100,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-content {
      background: #fff;
      border-radius: 8px;
      padding: 24px 18px;
      min-width: 240px;
      box-shadow: 0 2px 8px #20868422;
      text-align: center;
    }
    #deviceListSection h2 {
      color: #D20014;
      margin-top: 20px;
      font-size: 1.3em;
      margin-bottom: 8px;
    }
    .device-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 0;
      border-bottom: 1px solid #eee;
    }
    .device-type {
      color: #208684;
      font-weight: bold;
    }
    .device-subtype {
      color: #656565;
      font-size: 13px;
      margin-left: 7px;
    }
    .delete-btn {
      background: #D20014;
      padding: 5px 9px;
      font-size: 14px;
      border-radius: 4px;
      margin-left: 7px;
    }
    .delete-btn:hover {
      background: #9F000F;
    }
    .emptylist {
      color: #aaa;
      padding: 14px 0 14px 0;
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <svg width="140" height="32" viewBox="0 0 140 32" style="vertical-align: middle;">
      <rect width="32" height="32" fill="#D20014"/>
      <rect x="6" y="6" width="20" height="20" fill="white"/>
      <rect x="11" y="11" width="10" height="10" fill="#D20014"/>
      <text x="44" y="22.5" font-size="20" fill="white" font-family="Arial" font-weight="bold">ROCKWOOL</text>
    </svg>
    <h1>Device Scan App</h1>
  </header>
  <main>
    <button id="newScanBtn" type="button">Scan QR/Stregkode</button>
    <div id="manualInput">
      <input type="text" id="manualCode" placeholder="Indtast kode">
      <button id="addManualBtn" type="button">Tilføj</button>
    </div>

    <div id="deviceTypeDialog" class="modal" style="display:none;">
      <div class="modal-content">
        <h2>Vælg enhedstype</h2>
        <select id="deviceTypeSelect" style="font-size:16px;padding:7px 10px;">
          <option value="mobil">Mobil</option>
          <option value="tablet">Tablet</option>
          <option value="pc">PC</option>
        </select>
        <div id="subtypeSelect" style="margin-top:16px;"></div>
        <button id="confirmTypeBtn" type="button" style="margin-top:18px;">Bekræft</button>
      </div>
    </div>

    <section id="deviceListSection">
      <h2>Enheder</h2>
      <div id="deviceList"></div>
    </section>

    <div class="actions">
      <button id="lockListBtn" type="button">Lås listen</button>
      <button id="pdfBtn" type="button">Lav PDF</button>
    </div>
  </main>

  <div id="confirmLockModal" class="modal" style="display:none;">
    <div class="modal-content">
      <p style="font-size:1.2em;">Er du sikker på du vil slutte denne liste?</p>
      <button id="confirmLockYes" type="button" style="margin-right:16px;">Ja</button>
      <button id="confirmLockNo" type="button">Nej</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.72/pdfmake.min.js"></script>
  <script>
    // --- Data model ---
    let devices = []; // Array af { code, type, subtype }
    let listLocked = false;

    // --- HTML Elements ---
    const deviceList = document.getElementById('deviceList');
    const deviceTypeDialog = document.getElementById('deviceTypeDialog');
    const deviceTypeSelect = document.getElementById('deviceTypeSelect');
    const subtypeSelect = document.getElementById('subtypeSelect');
    const confirmTypeBtn = document.getElementById('confirmTypeBtn');
    const lockListBtn = document.getElementById('lockListBtn');
    const pdfBtn = document.getElementById('pdfBtn');
    const manualCode = document.getElementById('manualCode');
    const addManualBtn = document.getElementById('addManualBtn');
    const newScanBtn = document.getElementById('newScanBtn');
    const confirmLockModal = document.getElementById('confirmLockModal');
    const confirmLockYes = document.getElementById('confirmLockYes');
    const confirmLockNo = document.getElementById('confirmLockNo');

    // --- Device subtype valgmuligheder ---
    const subtypes = {
      mobil: ["iPhone", "Android", "Andet"],
      tablet: ["iPad", "Android Tablet", "Andet"],
      pc: ["Laptop", "Desktop", "Andet"]
    };
    // --- Gem til localStorage ---
    function saveDevices() {
      localStorage.setItem('rw_devices_list', JSON.stringify(devices));
      localStorage.setItem('rw_devices_locked', listLocked ? "1" : "0");
    }
    // --- Load fra localStorage ---
    function loadDevices() {
      try {
        devices = JSON.parse(localStorage.getItem('rw_devices_list')) || [];
        listLocked = localStorage.getItem('rw_devices_locked') == "1";
      } catch(e) {
        devices = [];
        listLocked = false;
      }
    }
    loadDevices();

    // --- UI: Vis listen ---
    function renderDeviceList() {
      deviceList.innerHTML = '';
      const any = devices.length;
      if(!any) {
        deviceList.innerHTML = "<div class=\"emptylist\">(Ingen enheder endnu)</div>";
        return;
      }
      ['mobil','tablet','pc'].forEach(type => {
        const filtered = devices.filter(x=>x.type === type);
        if(filtered.length) {
          let typeName = type[0].toUpperCase() + type.slice(1);
          deviceList.innerHTML += `<div><b>${typeName}</b></div>`;
          filtered.forEach((dev,i) => {
            deviceList.innerHTML += `
              <div class="device-row">
                <span>
                  <span class="device-type">${dev.code}</span>
                  <span class="device-subtype">${dev.subtype}</span>
                </span>
                ${!listLocked ? `<button class="delete-btn" data-i="${devices.indexOf(dev)}">Slet</button>` : ''}
              </div>`;
          });
        }
      });
    }
    deviceList.onclick = function(e) {
      if(e.target.classList.contains("delete-btn") && !listLocked) {
        const idx = e.target.dataset.i;
        devices.splice(idx,1);
        saveDevices();
        renderDeviceList();
      }
    };

    // --- Scan QR/barcode (vis dialog/simuler kode for demo) ---
    newScanBtn.onclick = async function() {
      if(listLocked) return;
      let scanCode = prompt("Scan eller indtast kode her (demo).");
      if (scanCode && scanCode.trim()) {
        showDeviceTypeDialog(scanCode.trim());
      }
    };

    // --- Manuel indtastning ---
    addManualBtn.onclick = function() {
      if(listLocked) return;
      let code = manualCode.value.trim();
      if (code) {
        manualCode.value='';
        showDeviceTypeDialog(code);
      }
    };

    // -- Enter i inputfelt --
    manualCode.addEventListener('keyup',function(e) {
      if(e.key==='Enter') addManualBtn.click();
    });

    // --- Vælg enhedstype + subtype ---
    function showDeviceTypeDialog(code) {
      deviceTypeDialog.style.display = 'flex';
      deviceTypeSelect.value = "mobil";
      renderSubtypeSelect("mobil");
      deviceTypeDialog.dataset.code = code;
    }
    deviceTypeSelect.onchange = function() {
      renderSubtypeSelect(deviceTypeSelect.value);
    };
    function renderSubtypeSelect(type) {
      let opts = subtypes[type] || ["Andet"];
      subtypeSelect.innerHTML = `<select id="subtypeSelectDropdown" style="font-size:15px;width:90%;padding:8px;margin-top:5px;">${
        opts.map(s=>`<option value="${s}">${s}</option>`).join('')
      }</select>`;
    }

    confirmTypeBtn.onclick = function() {
      let code = deviceTypeDialog.dataset.code;
      let type = deviceTypeSelect.value;
      let subtype = document.getElementById("subtypeSelectDropdown").value;
      devices.push({code, type, subtype});
      saveDevices();
      renderDeviceList();
      deviceTypeDialog.style.display = 'none';
    };

    // Luk modal ved klik udenfor
    window.onclick = function(e){
      if(e.target === deviceTypeDialog) deviceTypeDialog.style.display = "none";
      if(e.target === confirmLockModal) confirmLockModal.style.display = "none";
    };

    // --- Lås listen ---
    lockListBtn.onclick = function() {
      if(listLocked) return;
      confirmLockModal.style.display = 'flex';
    };
    confirmLockYes.onclick = function() {
      listLocked = true;
      saveDevices();
      renderDeviceList();
      confirmLockModal.style.display = 'none';
      lockListBtn.disabled = true;
    };
    confirmLockNo.onclick = function() {
      confirmLockModal.style.display = 'none';
    };

    // --- Lav PDF med tjekbokse ---
    pdfBtn.onclick = function() {
      if(!devices.length) {
        alert("Ingen enheder på listen!");
        return;
      }
      let doc = {
        content: [],
        styles: {
          header: {color:'#D20014',fontSize:18,bold:true}
        }
      };
      doc.content.push({text:'Rockwool Device List', style:'header', margin:[0,0,0,12]});
      ['mobil','tablet','pc'].forEach(type => {
        const filtered = devices.filter(x=>x.type === type);
        if(filtered.length) {
          doc.content.push({text:type[0].toUpperCase()+type.slice(1), color:'#208684', fontSize:15, bold:true, margin:[0,12,0,4]});
          filtered.forEach(dev => {
            doc.content.push({
              columns: [
                {text:`${dev.code} (${dev.subtype})`,width:'*'},
                {text:'[   ]',width:40}
              ]
            });
          });
        }
      });
      pdfMake.createPdf(doc).download("rockwool-device-list.pdf");
    };

    // --- Initialisering ---
    renderDeviceList();
    if(listLocked) lockListBtn.disabled = true;
  </script>
</body>
</html>
