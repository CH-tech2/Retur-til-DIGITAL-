```html
<!DOCTYPE html>
<html lang="da">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Enhed Scanner OCR</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:#f5f5f5;
    padding:10px;
    color:#333;
}

.container{
    max-width:600px;
    margin:0 auto;
    background:white;
    border-radius:8px;
    padding:15px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.header{
    background:linear-gradient(135deg,#D20014 0%,#9F000F 100%);
    color:white;
    padding:20px;
    border-radius:8px;
    margin-bottom:20px;
    text-align:center;
}

.scanning-section{
    background:#f0f8f7;
    padding:15px;
    border-radius:8px;
    border:2px solid #208684;
}

#cameraWrapper{
    display:none;
    text-align:center;
    margin-bottom:15px;
}

video{
    width:100%;
    max-width:240px;
    height:160px;
    object-fit:cover;
    border-radius:10px;
    background:black;
}

.input-group{
    margin-bottom:12px;
}

.input-group label{
    display:block;
    margin-bottom:5px;
    font-weight:600;
    font-size:13px;
}

input,
select{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:16px;
}

.button-group{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

button{
    flex:1;
    min-width:120px;
    padding:12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    color:white;
    font-size:15px;
    font-weight:600;
}

.btn-green{
    background:#208684;
}

.btn-red{
    background:#D20014;
}

.btn-gray{
    background:#656565;
}

.status{
    margin-top:10px;
    padding:10px;
    border-radius:6px;
    background:#eef;
    font-size:13px;
}

.items-section{
    margin-top:20px;
}

.item{
    background:white;
    border:1px solid #ddd;
    border-radius:6px;
    padding:12px;
    margin-bottom:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.item-code{
    font-weight:700;
    font-size:14px;
}

.item-type{
    font-size:12px;
    color:#666;
    margin-top:4px;
}

.item button{
    flex:none;
    padding:8px 10px;
    font-size:12px;
}

.empty-message{
    text-align:center;
    color:#999;
    padding:20px;
}

.action-buttons{
    display:flex;
    gap:10px;
    margin-top:20px;
}

@media print{

    body{
        background:white;
        padding:0;
    }

    .scanning-section,
    .action-buttons,
    .header button,
    .item button{
        display:none;
    }

    .container{
        box-shadow:none;
        max-width:100%;
    }

}

</style>

</head>

<body>

<div class="container">

    <div class="header">

        <h1>📱 Enhed Scanner</h1>

        <p>OCR Tekst Genkendelse</p>

    </div>

    <div class="scanning-section">

        <div id="cameraWrapper">

            <video id="video" autoplay playsinline></video>

        </div>

        <div class="button-group">

            <button class="btn-green" onclick="startCamera()">
                📷 Start Kamera
            </button>

            <button class="btn-red" onclick="stopCamera()">
                ⛔ Stop Kamera
            </button>

            <button class="btn-gray" onclick="scanText()">
                🔍 Læs Tekst
            </button>

        </div>

        <div class="status" id="status">
            Klar
        </div>

        <div class="input-group">

            <label>Kode / Serienummer</label>

            <input
                type="text"
                id="codeInput"
                placeholder="Eks: G90C63NWVT"
            >

        </div>

        <div class="input-group">

            <label>Enhedstype</label>

            <select id="deviceType">

                <option value="">-- vælg type --</option>

                <option value="Tablet">
                    📱 Tablet
                </option>

                <option value="Telefon">
                    ☎️ Telefon
                </option>

                <option value="PC">
                    💻 PC
                </option>

            </select>

        </div>

        <div class="button-group">

            <button class="btn-green" onclick="addItem()">
                ✅ Tilføj
            </button>

        </div>

    </div>

    <div class="items-section">

        <h3>📋 Registrerede Enheder</h3>

        <div id="itemsList"></div>

        <div class="empty-message" id="emptyMessage">
            Ingen enheder endnu
        </div>

    </div>

    <div class="action-buttons">

        <button class="btn-green" onclick="savePDF()">
            📄 Gem som PDF
        </button>

    </div>

</div>

<script>

let stream = null;

let items = [];

async function startCamera(){

    try{

        stream = await navigator.mediaDevices.getUserMedia({

            video:{
                facingMode:"environment"
            },

            audio:false

        });

        const video = document.getElementById('video');

        video.srcObject = stream;

        document.getElementById('cameraWrapper').style.display = 'block';

        setStatus('📷 Kamera startet');

    }catch(err){

        console.log(err);

        setStatus('❌ Kamera fejl');

    }

}

function stopCamera(){

    if(stream){

        stream.getTracks().forEach(track => track.stop());

        stream = null;

    }

    document.getElementById('cameraWrapper').style.display = 'none';

    setStatus('⛔ Kamera stoppet');

}

function setStatus(text){

    document.getElementById('status').innerText = text;

}

async function scanText(){

    try{

        const video = document.getElementById('video');

        if(!stream){

            setStatus('❌ Start kamera først');

            return;

        }

        setStatus('🔍 Scanner tekst...');

        const canvas = document.createElement('canvas');

        canvas.width = video.videoWidth;

        canvas.height = video.videoHeight;

        const ctx = canvas.getContext('2d');

        ctx.drawImage(video,0,0);

        const result = await Tesseract.recognize(
            canvas,
            'eng'
        );

        let text = result.data.text;

        text = text
            .replace(/\n/g,' ')
            .replace(/[^A-Z0-9]/gi,' ')
            .replace(/\s+/g,' ')
            .trim();

        const matches = text.match(/[A-Z0-9]{6,20}/g);

        if(matches && matches.length > 0){

            document.getElementById('codeInput').value = matches[0];

            setStatus('✅ Serienummer fundet');

        }else{

            setStatus('❌ Ingen kode fundet');

        }

    }catch(err){

        console.log(err);

        setStatus('❌ OCR fejl');

    }

}

function addItem(){

    const code = document.getElementById('codeInput').value.trim();

    const type = document.getElementById('deviceType').value;

    if(!code){

        setStatus('❌ Ingen kode');

        return;

    }

    if(!type){

        setStatus('❌ Vælg type');

        return;

    }

    const exists = items.some(item => item.code === code);

    if(exists){

        setStatus('⚠️ Koden findes allerede');

        return;

    }

    items.push({

        code:code,
        type:type

    });

    renderItems();

    document.getElementById('codeInput').value = '';

    document.getElementById('deviceType').value = '';

    setStatus('✅ Enhed tilføjet');

}

function renderItems(){

    const list = document.getElementById('itemsList');

    const empty = document.getElementById('emptyMessage');

    if(items.length === 0){

        list.innerHTML = '';

        empty.style.display = 'block';

        return;

    }

    empty.style.display = 'none';

    list.innerHTML = items.map((item,index)=>`

        <div class="item">

            <div>

                <div class="item-code">
                    ${item.code}
                </div>

                <div class="item-type">
                    ${item.type}
                </div>

            </div>

            <button class="btn-red"
                onclick="deleteItem(${index})">

                Slet

            </button>

        </div>

    `).join('');

}

function deleteItem(index){

    items.splice(index,1);

    renderItems();

    setStatus('🗑️ Enhed slettet');

}

function savePDF(){

    window.print();

}

window.addEventListener('beforeunload', ()=>{

    stopCamera();

});

</script>

</body>

</html>
