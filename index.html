<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enhed Scanning App</title>

<script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:#f5f5f5;
    padding:10px;
    color:#333;
}

.container{
    max-width:600px;
    margin:0 auto;
    background:white;
    border-radius:8px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    padding:15px;
    min-height:100vh;
}

.header{
    background:linear-gradient(135deg,#D20014 0%,#9F000F 100%);
    color:white;
    padding:20px;
    border-radius:8px;
    margin-bottom:20px;
    text-align:center;
    position:relative;
}

.version-badge{
    position:absolute;
    top:10px;
    right:10px;
    background:rgba(255,255,255,0.3);
    padding:4px 8px;
    border-radius:4px;
    font-size:10px;
    font-weight:600;
}

.list-selector{
    margin-bottom:20px;
    padding:15px;
    background:#f9f9f9;
    border-radius:8px;
    border-left:4px solid #208684;
}

.list-buttons{
    display:flex;
    flex-direction:column;
    gap:8px;
}

.list-btn{
    padding:12px;
    background:white;
    border:2px solid #208684;
    border-radius:6px;
    cursor:pointer;
    text-align:left;
    font-weight:600;
}

.btn-new-list{
    width:100%;
    padding:12px;
    background:#D20014;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    margin-bottom:10px;
    font-weight:600;
}

.scanning-section{
    background:#f0f8f7;
    padding:15px;
    border-radius:8px;
    margin-bottom:20px;
    border:2px solid #208684;
}

#interactive{
    width:100%;
    max-height:400px;
    border-radius:6px;
    overflow:hidden;
    display:none;
    background:#000;
    margin-bottom:12px;
}

#interactive video,
#interactive canvas{
    width:100%;
}

.camera-controls{
    display:none;
    gap:8px;
    margin-bottom:12px;
}

.btn-camera,
.btn{
    flex:1;
    padding:10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    color:white;
    font-weight:600;
    font-size:16px;
}

.btn-camera{
    background:#208684;
}

.btn-camera.active{
    background:#D20014;
}

.btn-scan{
    background:#208684;
}

.btn-manual{
    background:#656565;
}

.button-group{
    display:flex;
    gap:10px;
    margin-top:12px;
}

.input-group{
    margin-bottom:12px;
}

.input-group label{
    display:block;
    margin-bottom:5px;
    font-weight:600;
    font-size:12px;
}

input,
select,
button{
    font-size:16px;
}

.input-group input,
.input-group select{
    width:100%;
    padding:10px;
    border:1px solid #ddd;
    border-radius:6px;
}

.items-section{
    margin-top:20px;
}

.category-group{
    margin-bottom:15px;
}

.category-title{
    background:#208684;
    color:white;
    padding:8px 12px;
    border-radius:4px;
    margin-bottom:8px;
    font-weight:600;
}

.item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:white;
    border:1px solid #ddd;
    border-radius:6px;
    padding:12px;
    margin-bottom:8px;
}

.item-code{
    font-weight:600;
}

.item-actions{
    display:flex;
    gap:8px;
}

.btn-edit-item,
.btn-delete-item{
    border:none;
    padding:6px 10px;
    border-radius:4px;
    cursor:pointer;
    color:white;
}

.btn-edit-item{
    background:#208684;
}

.btn-delete-item{
    background:#D20014;
}

.empty-message{
    text-align:center;
    padding:20px;
    color:#999;
}

.status-message{
    padding:8px 12px;
    border-radius:4px;
    margin-bottom:10px;
    text-align:center;
    font-size:12px;
}

.status-success{
    background:#d4edda;
    color:#155724;
}

.status-error{
    background:#f8d7da;
    color:#721c24;
}

.status-info{
    background:#d1ecf1;
    color:#0c5460;
}

.action-buttons{
    display:flex;
    gap:10px;
    margin-top:20px;
}

.btn-save{
    background:#208684;
}

.btn-lock{
    background:#D20014;
}

.btn-pdf{
    background:#656565;
}

</style>
</head>

<body>

<div class="container">

    <div class="header">
        <div class="version-badge">v2.0</div>
        <h1>📱 Enhed Scanning</h1>
        <p>Rockwool Enhed Inventar</p>
    </div>

    <div class="list-selector" id="listSelector">

        <button class="btn-new-list" onclick="createNewList()">
            ➕ Ny Liste
        </button>

        <div class="list-buttons" id="listButtons"></div>

    </div>

    <div id="mainContent" style="display:none;">

        <h2 id="listTitle"></h2>

        <div class="scanning-section">

            <h3>📸 Scan eller Manuel Indtastning</h3>

            <div id="statusMessage"></div>

            <div id="interactive"></div>

            <div class="camera-controls" id="cameraControls">
                <button class="btn-camera active" onclick="startCamera()">
                    📷 Start Kamera
                </button>

                <button class="btn-camera" onclick="stopCamera()">
                    ⛔ Stop Kamera
                </button>
            </div>

            <div class="input-group">
                <label>Kode</label>
                <input type="text" id="codeInput" placeholder="Scan eller skriv kode">
            </div>

            <div class="input-group">
                <label>Enhedstype</label>

                <select id="deviceType">
                    <option value="">-- vælg --</option>
                    <option value="Tablet">📱 Tablet</option>
                    <option value="Telefon">☎️ Telefon</option>
                    <option value="PC">💻 PC</option>
                </select>
            </div>

            <div class="button-group">

                <button class="btn btn-scan" onclick="toggleCamera()">
                    📷 Kamera
                </button>

                <button class="btn btn-manual" onclick="focusCodeInput()">
                    ⌨️ Tastatur
                </button>

                <button class="btn btn-scan" onclick="handleScan()">
                    ✅ Tilføj
                </button>

            </div>

        </div>

        <div class="items-section" id="itemsSection" style="display:none;">
            <div id="itemsList"></div>
        </div>

        <div id="emptyItems" class="empty-message">
            Ingen enheder endnu
        </div>

        <div class="action-buttons">

            <button class="btn btn-save" onclick="saveList()">
                💾 Gem
            </button>

            <button class="btn btn-pdf" onclick="generatePDF()">
                📄 PDF
            </button>

            <button class="btn btn-lock" onclick="lockList()">
                🔒 Lås
            </button>

        </div>

    </div>

</div>

<script>

const APP_VERSION = 'v2.0';

let lists = [];
let currentListId = null;

let cameraActive = false;
let quaggaHandler = null;

function init(){

    loadLists();

    renderListButtons();

}

function loadLists(){

    const saved = localStorage.getItem('lists');

    lists = saved ? JSON.parse(saved) : [];

}

function saveLists(){

    localStorage.setItem('lists', JSON.stringify(lists));

}

function createNewList(){

    const title = prompt('Hvad skal listen hedde?');

    if(!title) return;

    const newList = {

        id: Date.now(),
        title: title,
        items: [],
        locked: false,
        createdDate: new Date().toLocaleString('da-DK')

    };

    lists.unshift(newList);

    saveLists();

    renderListButtons();

    selectList(newList.id);

}

function renderListButtons(){

    const container = document.getElementById('listButtons');

    if(lists.length === 0){

        container.innerHTML = `
            <div class="empty-message">
                Ingen lister endnu
            </div>
        `;

        return;
    }

    container.innerHTML = lists.map(list => `
        <button class="list-btn" onclick="selectList(${list.id})">
            ${list.title}
            <br>
            <small>${list.createdDate}</small>
        </button>
    `).join('');

}

function selectList(id){

    currentListId = id;

    document.getElementById('listSelector').style.display = 'none';

    document.getElementById('mainContent').style.display = 'block';

    renderCurrentList();

}

function getCurrentList(){

    return lists.find(l => l.id === currentListId);

}

function renderCurrentList(){

    const list = getCurrentList();

    if(!list) return;

    document.getElementById('listTitle').textContent = list.title;

    renderItems();

}

function renderItems(){

    const list = getCurrentList();

    const itemsList = document.getElementById('itemsList');

    const itemsSection = document.getElementById('itemsSection');

    const emptyItems = document.getElementById('emptyItems');

    if(!list || list.items.length === 0){

        itemsSection.style.display = 'none';

        emptyItems.style.display = 'block';

        return;

    }

    itemsSection.style.display = 'block';

    emptyItems.style.display = 'none';

    itemsList.innerHTML = list.items.map((item,index)=>`

        <div class="item">

            <div>
                <div class="item-code">${item.code}</div>
                <small>${item.type}</small>
            </div>

            <div class="item-actions">

                <button class="btn-edit-item"
                    onclick="editItem(${index})">
                    Rediger
                </button>

                <button class="btn-delete-item"
                    onclick="deleteItem(${index})">
                    Slet
                </button>

            </div>

        </div>

    `).join('');

}

function showStatus(message,type){

    const div = document.getElementById('statusMessage');

    div.textContent = message;

    div.className = 'status-message status-' + type;

    setTimeout(()=>{

        div.textContent = '';
        div.className = '';

    },3000);

}

function startCamera(){

    if(cameraActive) return;

    document.getElementById('interactive').style.display = 'block';

    document.getElementById('cameraControls').style.display = 'flex';

    showStatus('🔄 Starter kamera...', 'info');

    Quagga.init({

        inputStream:{
            name:"Live",
            type:"LiveStream",
            target:document.querySelector('#interactive'),
            constraints:{
                facingMode:"environment"
            }
        },

        decoder:{
            readers:[
                "code_128_reader",
                "ean_reader",
                "ean_8_reader"
            ]
        }

    }, function(err){

        if(err){

            console.log(err);

            showStatus('❌ Kamera fejl', 'error');

            return;
        }

        Quagga.start();

        cameraActive = true;

        showStatus('✅ Kamera aktiv', 'success');

    });

    if(quaggaHandler !== null){

        Quagga.offDetected(quaggaHandler);

    }

    quaggaHandler = function(result){

        if(result.codeResult && result.codeResult.code){

            onScanSuccess(result.codeResult.code);

        }

    };

    Quagga.onDetected(quaggaHandler);

}

function stopCamera(){

    try{

        if(cameraActive){

            Quagga.stop();

        }

    }catch(e){

        console.log(e);

    }

    cameraActive = false;

    document.getElementById('interactive').style.display = 'none';

    document.getElementById('cameraControls').style.display = 'none';

    if(quaggaHandler){

        try{

            Quagga.offDetected(quaggaHandler);

        }catch(e){

            console.log(e);

        }

    }

    quaggaHandler = null;

    showStatus('📷 Kamera stoppet', 'info');

}

function toggleCamera(){

    if(!cameraActive){

        startCamera();

    }else{

        stopCamera();

    }

}

function onScanSuccess(content){

    document.getElementById('codeInput').value = content;

    stopCamera();

    showStatus('✅ Kode scannet', 'success');

}

function focusCodeInput(){

    stopCamera();

    const input = document.getElementById('codeInput');

    input.focus();

    input.select();

    showStatus('⌨️ Manuel indtastning aktiv', 'info');

}

function handleScan(){

    const code = document.getElementById('codeInput').value.trim();

    const type = document.getElementById('deviceType').value;

    if(!code){

        showStatus('❌ Skriv en kode', 'error');

        return;
    }

    if(!type){

        showStatus('❌ Vælg en type', 'error');

        return;
    }

    const list = getCurrentList();

    if(!list){

        showStatus('❌ Ingen liste valgt', 'error');

        return;
    }

    if(!Array.isArray(list.items)){

        list.items = [];

    }

    const exists = list.items.some(item => item.code === code);

    if(exists){

        showStatus('⚠️ Koden findes allerede', 'error');

        return;
    }

    list.items.push({

        code: code,
        type: type,
        addedDate: new Date().toLocaleString('da-DK')

    });

    saveLists();

    renderItems();

    document.getElementById('codeInput').value = '';

    document.getElementById('deviceType').value = '';

    document.getElementById('codeInput').focus();

    showStatus('✅ Enhed tilføjet', 'success');

}

function deleteItem(index){

    const list = getCurrentList();

    if(!list) return;

    if(confirm('Slet denne enhed?')){

        list.items.splice(index,1);

        saveLists();

        renderItems();

        showStatus('✅ Enhed slettet', 'success');

    }

}

function editItem(index){

    const list = getCurrentList();

    const newCode = prompt(
        'Rediger kode:',
        list.items[index].code
    );

    if(!newCode) return;

    list.items[index].code = newCode;

    saveLists();

    renderItems();

    showStatus('✅ Enhed opdateret', 'success');

}

function saveList(){

    saveLists();

    showStatus('💾 Liste gemt', 'success');

}

function lockList(){

    const list = getCurrentList();

    if(!list) return;

    if(confirm('Lås listen?')){

        list.locked = true;

        saveLists();

        showStatus('🔒 Liste låst', 'success');

    }

}

function generatePDF(){

    window.print();

}

window.addEventListener('load', init);

window.addEventListener('beforeunload', ()=>{

    if(cameraActive){

        stopCamera();

    }

});

</script>

</body>
</html>
