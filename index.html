<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Enhed Scanning App v2.3</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Quagga2 til QR/stregkode -->
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
    <!-- Tesseract.js til OCR -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        /* ... din CSS uændret! ... (fra din kode ovenfor) ... */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; padding: 10px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 15px; min-height: 100vh; }
        .header { background: linear-gradient(135deg, #D20014 0%, #9F000F 100%); color: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; text-align: center; position: relative; }
        .header h1 { font-size: 24px; margin-bottom: 5px; }
        .header p { font-size: 12px; opacity: 0.9; }
        .version-badge { position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,0.3); color: white; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
        .list-selector { margin-bottom: 20px; padding: 15px; background: #f9f9f9; border-radius: 8px; border-left: 4px solid #208684; }
        .list-selector h2 { font-size: 14px; margin-bottom: 10px; color: #208684; }
        .list-buttons { display: flex; flex-direction: column; gap: 8px; max-height: 250px; overflow-y: auto; }
        .list-btn { padding: 12px; background: white; border: 2px solid #208684; border-radius: 6px; cursor: pointer; font-size: 14px; text-align: left; transition: all 0.3s; color: #208684; font-weight: 600; }
        .list-btn:hover { background: #208684; color: white; }
        .list-btn small { display: block; font-size: 11px; margin-top: 5px; opacity: 0.8; font-weight: normal; }
        .btn-new-list { width: 100%; padding: 12px; background: #D20014; color: white; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 10px; transition: background 0.3s; }
        .btn-new-list:hover { background: #9F000F; }
        .list-title-section { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid #e0e0e0; }
        .list-title-section h2 { color: #333; margin-bottom: 5px; word-break: break-word; }
        .list-title-section p { font-size: 12px; color: #656565; }
        .edit-title-btn { padding: 6px 12px; background: #208684; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; margin-top: 8px; }
        .edit-title-btn:hover { background: #156b63; }
        .locked-badge { display: inline-block; background: #D20014; color: white; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-top: 8px; }
        .scanning-section { background: #f0f8f7; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 2px solid #208684; }
        .scanning-section h3 { color: #208684; margin-bottom: 12px; font-size: 14px; }
        #interactive { width: 320px; height: 180px; margin: 0 auto 12px auto; border-radius: 6px; overflow: hidden; display: none; background: #000; }
        #interactive video, #interactive canvas { width: 100%; height: 100%; object-fit: cover; }
        .camera-controls { display: flex; gap: 8px; margin-bottom: 12px; justify-content:center;}
        .btn-camera { flex: 1 1 auto; padding: 10px 12px; background: #208684; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 13px; transition: background 0.3s;}
        .btn-camera:hover:not(:disabled) { background: #156b63; }
        .btn-camera:disabled { background: #ccc; cursor: not-allowed; }
        .btn-camera.active { background: #D20014; }
        .btn-camera.active:hover { background: #9F000F; }
        .btn-ocr { background: #656565;}
        .btn-ocr:hover:not(:disabled) { background: #333;}
        .input-group { margin-bottom: 14px; }
        .input-group label { display: block; font-size: 13px; margin-bottom: 5px; color: #333; font-weight: 600; }
        .input-group input, .input-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; font-family: inherit; }
        .input-group input:focus, .input-group select:focus { outline: none; border-color: #208684; box-shadow: 0 0 4px rgba(32, 134, 132, 0.3);}
        .button-group { display: flex; gap: 10px; margin-top: 12px; }
        .btn { flex: 1; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 13px; transition: all 0.3s; }
        .btn-scan { background: #208684; color: white;}
        .btn-scan:hover:not(:disabled) { background: #156b63; }
        .btn-scan:disabled { background: #ccc; cursor: not-allowed; }
        .btn-manual { background: #656565; color: white; }
        .btn-manual:hover:not(:disabled) { background: #4a4a4a; }
        .btn-manual:disabled { background: #ccc; cursor: not-allowed; }
        .items-section { margin-bottom: 20px; }
        .items-section h3 { color: #333; margin-bottom: 12px; font-size: 14px; font-weight: 600; }
        .category-group { margin-bottom: 15px; }
        .category-title { background: #208684; color: white; padding: 8px 12px; border-radius: 4px; font-weight: 600; font-size: 13px; margin-bottom: 8px; }
        .item { background: white; border: 1px solid #ddd; border-radius: 6px; padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; transition: all 0.3s; }
        .item:hover { box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        .item-content { flex: 1; }
        .item-code { font-weight: 600; color: #333; font-size: 13px; word-break: break-all; }
        .item-category { font-size: 11px; color: #656565; margin-top: 4px; }
        .item-actions { display: flex; gap: 8px; margin-left: 10px; }
        .btn-edit-item { background: #208684; color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; transition: background 0.3s; }
        .btn-edit-item:hover { background: #156b63; }
        .btn-delete-item { background: #D20014; color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; transition: background 0.3s; }
        .btn-delete-item:hover { background: #9F000F; }
        .action-buttons { display: flex; gap: 10px; margin-top: 20px; padding-top: 20px; border-top: 2px solid #e0e0e0; }
        .btn-save, .btn-lock, .btn-pdf {
            flex: 1;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
        }
        .btn-save {background: #208684; color: white; border: none;}
        .btn-save:hover:not(:disabled) { background: #156b63;}
        .btn-save:disabled {background: #ccc; cursor: not-allowed;}
        .btn-pdf {background: #656565; color:white; border:none;}
        .btn-pdf:hover:not(:disabled) {background: #4a4a4a;}
        .btn-pdf:disabled {background: #ccc; cursor: not-allowed;}
        .btn-lock {background: #D20014; color: white; border:none;}
        .btn-lock:hover:not(:disabled) {background: #9F000F;}
        .btn-lock:disabled {background: #ccc; cursor: not-allowed;}
        .empty-message { text-align: center; color: #999; padding: 25px; font-size: 15px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 25px; border-radius: 8px; max-width: 90%; width: 100%; max-height: 90vh; overflow-y: auto; }
        .modal h3 { color: #333; margin-bottom: 15px; font-size: 16px; }
        .modal p { color: #656565; margin-bottom: 15px; font-size: 14px; }
        .modal-buttons, .edit-modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .modal-buttons button, .edit-modal-buttons button { flex: 1; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 13px; }
        .modal-btn-cancel, .edit-btn-cancel { background: #ddd; color: #333; }
        .modal-btn-cancel:hover, .edit-btn-cancel:hover { background: #ccc; }
        .modal-btn-confirm { background: #D20014; color: white; }
        .modal-btn-confirm:hover { background: #9F000F; }
        .edit-btn-save { background: #208684; color: white;}
        .status-message { padding: 8px 12px; border-radius: 4px; font-size: 13px; margin-bottom: 10px; text-align: center;}
        .status-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .status-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .status-info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        @media print { body { background: white; padding:0; }
          .container { box-shadow:none; padding:0; max-width:100%; }
          .header, .list-selector, .scanning-section, .action-buttons {display:none;}
          .list-title-section{page-break-after:avoid;}
          .category-group{page-break-inside:avoid;}
        }
    </style>
</head>
<body>
<div class="container">

<!-- Resten af html uændret -->

<!-- Kamera Knapper -->
<div class="camera-controls" id="cameraControls" style="display:none;">
    <button class="btn-camera" id="startCameraBtn" onclick="startCamera()">📷 Start Kamera</button>
    <button class="btn-camera" id="stopCameraBtn" onclick="stopCamera()" disabled>⛔ Stop Kamera</button>
    <button class="btn-camera btn-ocr" id="ocrBtn" onclick="readTextFromCamera()" disabled>🔡 Læs Tekst</button>
</div>
<div id="interactive" class="viewport"></div>

<div class="scanning-section" id="scanningSection">
    <h3>📸 Scan, Læs tekst eller Tast manuelt</h3>
    <div id="statusMessage"></div>
    <div class="input-group">
        <label for="codeInput">Stregkode / QR / Tekst</label>
        <input type="text" id="codeInput" placeholder="Scan, læs tekst eller skriv manuelt...">
    </div>
    <!-- ENHEDSTYPE OVER TILFØJ -->
    <div class="input-group">
        <label for="deviceType">Vælg Enhedstype</label>
        <select id="deviceType">
            <option value="">-- Vælg enhedstype --</option>
            <option value="Tablet">📱 Tablet</option>
            <option value="Telefon">☎️ Telefon</option>
            <option value="PC">💻 PC</option>
        </select>
    </div>
    <div class="button-group">
        <button class="btn btn-scan" id="scanBtn" onclick="toggleCamera()">📷 Kamera</button>
        <button class="btn btn-scan" id="addBtn" onclick="handleScan()">✅ Tilføj</button>
        <button class="btn btn-manual" id="manualBtn" onclick="focusCodeInput()">⌨️ Tastatur</button>
    </div>
</div>
<!-- ... resten er uændret ... -->

<script>
/* AL DIN store JS, med følgende correction! */

// 1: Aktiver/deaktiver knapper korrekt
function startCamera() {
    document.getElementById('interactive').style.display = 'block';
    document.getElementById('cameraControls').style.display = 'flex';
    showStatus('🔄 Starter kamera...', 'info');
    Quagga.init({
        inputStream: {
            name: "Live",
            type: "LiveStream",
            target: document.querySelector('#interactive'),
            constraints: {facingMode: "environment", width:320, height:180}
        },
        decoder: { readers: ["code_128_reader", "ean_reader", "ean_8_reader", "qr_reader"] }
    }, function(err) {
        if (err) {
            showStatus('❌ Kamera fejl. Giv tilladelse til kameraet eller prøv en anden browser.', 'error'); return;
        }
        Quagga.start();
        cameraActive = true;
        document.getElementById('startCameraBtn').disabled = true;
        document.getElementById('stopCameraBtn').disabled = false;
        document.getElementById('ocrBtn').disabled = false;
        showStatus('✅ Kamera klar - hold kode mod kameraet', 'success');
    });
    if (quaggaHandler !== null) Quagga.offDetected(quaggaHandler);
    quaggaHandler = function(result) {
        if (result.codeResult && result.codeResult.code) {
            onScanSuccess(result.codeResult.code);
        }
    };
    Quagga.onDetected(quaggaHandler);
}
function stopCamera() {
    if (cameraActive) {
        Quagga.stop();
        cameraActive = false;
    }
    document.getElementById('startCameraBtn').disabled = false;
    document.getElementById('stopCameraBtn').disabled = true;
    document.getElementById('ocrBtn').disabled = true;
    document.getElementById('interactive').style.display = 'none';
    document.getElementById('cameraControls').style.display = 'none';
    if (quaggaHandler) Quagga.offDetected(quaggaHandler);
    quaggaHandler = null;
}
function toggleCamera() {
    const interactive = document.getElementById('interactive');
    if (interactive.style.display === 'none') startCamera();
    else stopCamera();
}
async function readTextFromCamera() {
    const video = document.querySelector('#interactive video');
    if (!video) {
        showStatus('Kameraet skal være tændt for at læse tekst', 'error');
        return;
    }
    showStatus('🔡 Læser tekst...', 'info');
    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
    try {
        const { data: { text } } = await Tesseract.recognize(canvas, 'dan');
        document.getElementById('codeInput').value = text.replace(/\s+/g, '').substring(0,32);
        showStatus('✅ Tekst læst!', 'success');
        document.getElementById('deviceType').focus();
    } catch(e) {
        showStatus('❌ Tekst kunne ikke læses - prøv igen.', 'error')
    }
}

/* ... resten af din JS-kode (uændret, handleScan, lister, modal osv.) ... */

</script>
</body>
</html>

</html>
